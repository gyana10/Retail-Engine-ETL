version: 2

models:
  - name: dim_customers
    description: "Customer dimension table"
    columns:
      - name: customer_id
        description: "Unique customer ID"
        tests:
          - unique
          - not_null

  - name: dim_products
    description: "Product dimension table"
    columns:
      - name: product_id
        description: "Unique product ID"
        tests:
          - unique
          - not_null

  - name: dim_sellers
    description: "Seller dimension table"
    columns:
      - name: seller_id
        description: "Unique seller ID"
        tests:
          - unique
          - not_null

  - name: fact_orders
    description: "Order items fact table joining orders, order items, and payments"
    columns:
      - name: order_id
        description: "Order identifier"
        tests:
          - not_null
